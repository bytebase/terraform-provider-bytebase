version: "2"
run:
  build-tags:
    - mysql
linters:
  enable:
    - forbidigo
    - gocritic
    - godot
    - misspell
    - nilerr
    - revive
    - rowserrcheck
    - sqlclosecheck
  settings:
    forbidigo:
      forbid:
        - pattern: fmt\.Errorf(# Please use errors\.Wrap\|Wrapf\|Errorf instead)?
        - pattern: ioutil\.ReadDir(# Please use os\.ReadDir)?
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      enable-all-rules: true
      rules:
        - name: file-header
          disabled: true
        - name: line-length-limit
          disabled: true
        - name: function-length
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: function-result-limit
          disabled: true
        - name: banned-characters
          disabled: true
        - name: argument-limit
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: confusing-results
          disabled: true
        - name: add-constant
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: nested-structs
          disabled: true
        - name: import-shadowing
          disabled: true
        - name: early-return
          disabled: true
        - name: use-any
          disabled: true
        - name: unchecked-type-assertion
          disabled: true
        - name: redundant-import-alias
          disabled: true
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: Rollback
      - path: (.+)\.go$
        text: logger.Sync
      - path: (.+)\.go$
        text: pgInstance.Stop
      - path: (.+)\.go$
        text: fmt.Printf
      - path: (.+)\.go$
        text: fmt.Print
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/bytebase/terraform-provider-bytebase
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
