name: build

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  golangci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - run: go generate ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.7
          args: --verbose --timeout 20m --max-same-issues=30 --allow-parallel-runners
  go-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - name: Verify tidy
        run: |
          go mod tidy
          git diff --exit-code
  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: "1.3.*"
          terraform_wrapper: false
      - run: |
          go generate ./...
          go test -v -cover ./...
        env:
          TF_ACC: "1"
          # Test uses mock service, and any value should work
          BYTEBASE_SERVICE_ACCOUNT: "terraform@service.bytebase.com"
          BYTEBASE_SERVICE_KEY: "12345"
          BYTEBASE_URL: "https://bytebase.example.com"
